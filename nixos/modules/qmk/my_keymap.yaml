layers:
  Base:
  - [ESC, {tl: "!", t: '1'}, {tl: "@", t: '2'}, {tl: "#", t: '3'}, {tl: "$", t: '4'}, {tl: "%", t: '5'}, {tl: "^", t: '6'}, {tl: "&", t: '7'}, {tl: "*", t: '8'}, {tl: "(", t: '9'}, {tl: ")", t: '0'}, "BACK SPACE"]
  - [TAB, Q, W, E, R, T, Y, U, I, O, P, {tl: "{", t: '['}]
  - ["LEFT SHIFT", A, S, D, F, G, H, J, K, L, {tl: ":", t: ";"}, {tl: "\"", t: ''''}]
  - ["LEFT CTRL", Z, X, C, V, B, "LEFT ALT", "RIGHT ALT", N, M, {tl: "<", t: ","}, {tl: ">", t: "."}, {tl: "?", t: "/"}, "RIGHT SHIFT"]
  - ["WIN", {t: "SP_1", type: tap}, ENTER, "SPACE", "SP_2", {t: ▽, type: trans}]
  "SP_1":
  - ["~", "!", "@", "#", "$", "%", "^", "&", "*", "(", ")", "PGUP"]
  - ['`', M(0), ↑, M(1), HOME, END, INS, '1', '2', '3', '0', PGDN]
  - [CAPS, ←, ↓, →, M(2), "[", "]", '4', '5', '6', +, '/']
  - [M(3), M(4), M(5), M(6), M(7), '{', "(", ")", '}', '7', '8', '9']
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: "SP_1", type: ghost}
    - DEL
    - DEL
    - "SP_2"
    - P0
  "SP_2":
  - [F12, F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11]
  - ['', "!", "@", "#", "$", "%", "^", "&", "*", "(", ")", PSCR]
  - ['', '', '', VOLU, BRIU, "_", '=', '', '', '', '', '\']
  - - ''
    - ''
    - ''
    - VOLD
    - BRD
    - '-'
    - "("
    - {t: ▽, type: trans}
    - "+"
    - ''
    - ''
    - ''
    - ''
    - DEL
  - - {t: ▽, type: trans}
    - "SP_1"
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: "SP_2", type: ghost}
    - {t: ▽, type: trans}
  RU:
  - [ESC, {tl: "!", t: '1'}, {tl: "\"", t: '2'}, {tl: "№", t: '3'}, {tl: ";", t: '4'}, {tl: "%", t: '5'}, {tl: ":", t: '6'}, {tl: "?", t: '7'}, {tl: "*", t: '8'}, {tl: "(", t: '9'}, {tl: ")", t: '0'}, "BACK SPACE"]
  - [TAB, Й, Ц, У, К, Е, Н, Г, Ш, Щ, З, Х]
  - ["LEFT SHIFT", Ф, Ы, В, А, П, Р, О, Л, Д, Ж, Э]
  - ["LEFT CTRL", Я, Ч, С, М, И, "LEFT ALT", "RIGHT ALT", Т, Ь, Б, Ю, {tl: ",", t: "."}, "RIGHT SHIFT"]
  - ["WIN", {t: "SP_1", type: tap}, ENT, "SPACE", "SP_2", {t: ▽, type: trans}]
  "Win":
  - ['', 'tag 1', 'tag 2', 'tag 3', 'tag 4', 'tag 5', 'tag 6', 'tag 7', 'tag 8', 'tag 9', "view all", '']
  - ["prev tag", "window 1", "power menu", "dwm schpd", "rec menu", "tile", "full screen", "pass menu", "master +", '', "app menu", '']
  - ["LEFT SHIFT", "window 2", "sticky window", "master -", "center float", "kitty schpd", "master width -", "focus ↓", "focus ↑", "master widht +", "focus dock ↑", "new dock schpd"]
  - ["LEFT CTRL", "window 3", "last window", "clip board", "dots schpd", '', '', '', "prev sel window", "monocle", "monitor ←", "monitor →", '', '']
  - [{t: "WIN", type: ghost}, '', '', "change lang", '', '']
  "Win+Ctrl":
    - ['', 'tag 1(show)', 'tag 2(show)', 'tag 3(show)', 'tag 4(show)', 'tag 5(show)', 'tag 6(show)', 'tag 7(show)', 'tag 8(show)', 'tag 9(show)', '', '']
    - ['', '', "wifi menu", '', '', '', '', '', '', '', '', '']
    - ["LEFT SHIFT", '', "show all windows", '', '', "set schpd", "hide window", '', "killer menu", '', '', '']
    - [{t: "LEFT CTRL", type: ghost}, '', '', '', '', '', '', '', '', '', '', '', '', '']
    - [{t: "WIN", type: ghost}, '', '', "master", '', '']
  "Win+Shift":
    - ['', 'tag 1(move)', 'tag 2(move)', 'tag 3(move)', 'tag 4(move)', 'tag 5(move)', 'tag 6(move)', 'tag 7(move)', 'tag 8(move)', 'tag 9(move)', '', '']
    - ['', "push 1", "webcam", '', "rec stop", "term", 'trans late', "nixos", '', "cfact 0", "floatpos", '']
    - [{t: "LEFT SHIFT", type: ghost}, "push 2", '', "audio", "browser", "rm scr", "cfact +", "push ↓", "push ↑", "cfact -", "dock -", "adopt"]
    - ["LEFT CTRL", "push 3", "push last", "kill", '', "bar", '', '', "push prev", "zoom", "tag mon ←", "tag mon →", '', '']
    - [{t: "WIN", type: ghost}, '', '', "float", '', '']
  "Win+Ctrl+Shift":
    - ['', '1', '2', '3', '4', '5', '6', '7', '8', '9', '', '']
    - ['', "restart", '', '', '', '', '', '', '', '', '', '']
    - [{t: "LEFT SHIFT", type: ghost}, '', '', '', '', '', '', '', "rst test", '', '', '']
    - [{t: "LEFT CTRL", type: ghost}, '', '', '', '', '', '', '', '', '', '', '', '', '']
    - [{t: "WIN", type: ghost}, '', '', '', '', '']
draw_config:
  outer_pad_h: 80
  footer_text: ""
  key_h: 80
  key_w: 80
  combo_h: 24
  combo_w: 24
  key_rx: 0
  key_ry: 0
  inner_pad_w: 4
  inner_pad_h: 4
  dark_mode: true
  style_layer_activators: false
  svg_extra_style: |
    svg.keymap {
      background: #282828;
    }

    text.tl {
      font-size: 16px;
      transform: translate(4px, 4px);
    }

    text {
      paint-order: stroke fill;
      stroke: none;
    }

    text.label {
      font-size: 24px;
      display: none;
      stroke: none;
    }

    .tap {
      font-size: 18px;
    }

    text.hold {
      font-size: 18px;
    }

    rect.key {
      fill: #171717;
    }

    rect.key, rect.combo {
      stroke: #d65d0e;
      stroke-width: 1;
    }

    svg.keymap {
      fill: #ebdbb2;
    }

    text.trans {
      fill: #ebdbb2;
    }

    rect.held {
      fill: #171717;
    }
