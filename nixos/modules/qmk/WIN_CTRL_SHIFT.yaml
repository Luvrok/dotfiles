layout: {qmk_keyboard: keebio/iris_ce/rev1, layout_name: LAYOUT}
layers:
  "Win+Ctrl+Shift":
    - ['', '1', '2', '3', '4', '5', '6', '7', '8', '9', '', '']
    - ['', "restart", '', '', '', '', '', '', '', '', '', '']
    - [{t: "LEFT SHIFT", type: ghost}, '', '', '', '', '', '', '', "rst test", '', '', '']
    - [{t: "LEFT CTRL", type: ghost}, '', '', '', '', '', '', '', '', '', '', '', '', '']
    - [{t: "WIN", type: ghost}, '', '', '', '', '']
draw_config:
  outer_pad_h: 40
  footer_text: ""
  key_h: 80
  key_w: 80
  combo_h: 24
  combo_w: 24
  key_rx: 0
  key_ry: 0
  inner_pad_w: 4
  inner_pad_h: 4
  dark_mode: true
  style_layer_activators: false
  svg_extra_style: |
    svg.keymap {
      background: #282828;
    }

    text.tl {
      font-size: 16px;
      transform: translate(4px, 4px);
    }

    text {
      paint-order: stroke fill;
      stroke: none;
    }

    text.label {
      font-size: 24px;
      display: none;
      stroke: none;
    }

    .tap {
      font-size: 18px;
    }

    text.hold {
      font-size: 18px;
    }

    rect.key {
      fill: #171717;
    }

    rect.key, rect.combo {
      stroke: #d65d0e;
      stroke-width: 1;
    }

    svg.keymap {
      fill: #ebdbb2;
    }

    text.trans {
      fill: #ebdbb2;
    }

    rect.held {
      fill: #171717;
    }
